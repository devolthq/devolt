# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
version: "3.9"

services:
  api-server:
    hostname: api-server
    container_name: api-server
    platform: linux/amd64
    env_file:
      - ../.env.develop
    restart: always
    depends_on:
      - simulation
    build:
      context: ..
      dockerfile: build/Dockerfile.api-server
    ports:
      - 8083:8083
  simulation:
    hostname: simulation
    container_name: simulation
    platform: linux/amd64
    env_file:
      - ../.env.develop
    restart: always
    build:
      context: ..
      dockerfile: build/Dockerfile.simulation
  streaming:
    hostname: streaming
    container_name: streaming
    platform: linux/amd64
    env_file:
      - ../.env.develop
    restart: always
    build:
      context: ..
      dockerfile: build/Dockerfile.streaming
