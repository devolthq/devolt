version: "3.9"

volumes:
  mongodb-data:

services:
  zookeeper:
    hostname: zookeeper
    container_name: zookeeper
    platform: linux/amd64
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    hostname: kafka
    container_name: kafka
    platform: linux/amd64
    image: confluentinc/cp-kafka:7.3.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:9092,OUTSIDE://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://host.docker.internal:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --list --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 15s
      retries: 10
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
      - 9094:9094
    extra_hosts:
      - "host.docker.internal:host-gateway"
  control-center:
    image: confluentinc/cp-enterprise-control-center:7.3.0
    hostname: control-center
    container_name: control-center
    platform: linux/amd64
    depends_on:
      - kafka
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: "kafka:9092"
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      PORT: 9021
  hivemq:
    hostname: hivemq
    container_name: hivemq
    platform: linux/amd64
    build:
      context: ..
      dockerfile: ./deployments/Dockerfile.hivemq
    depends_on:
      - kafka
    ports:
      - 1883:1883
      - 8082:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
  mongo:
    image: mongo
    hostname: mongo
    container_name: mongo
    platform: linux/amd64
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping")' | mongo mongo:27017/test --quiet
      interval: 2s
      timeout: 2s
      retries: 20
    restart: always
    volumes:
      - ../database/mongodb:/docker-entrypoint-initdb.d
      - mongodb-data:/data/db